name: publish

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "templates/**"
      - "scripts/**"
      - "manifest.json"
      - "registry.json"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fanout:
    name: Dispatch to consumer repos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read registry
        id: registry
        run: |
          # registry.json -> { consumers: [{ owner, repo, branch }] }
          jq -c '.consumers[]' registry.json > consumers.ndjson
          echo "count=$(wc -l < consumers.ndjson | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Dispatch repository_dispatch to each consumer
        env:
          GH_TOKEN: ${{ secrets.SKILLS_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::SKILLS_REPO_TOKEN secret is missing." >&2
            exit 1
          fi

          while IFS= read -r consumer; do
            owner=$(echo "$consumer" | jq -r '.owner')
            repo=$(echo "$consumer"  | jq -r '.repo')
            branch=$(echo "$consumer" | jq -r '.branch // "main"')

            echo "::group::Dispatch -> $owner/$repo @ $branch"
            curl -fsSL \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$owner/$repo/dispatches" \
              -d "$(jq -n --arg sha "${{ github.sha }}" --arg branch "$branch" '
                  { event_type: "skills-update",
                    client_payload: { source_sha: $sha, target_branch: $branch } }')"
            echo "::endgroup::"
          done < consumers.ndjson

          echo "Dispatched to ${{ steps.registry.outputs.count }} consumer(s)."
